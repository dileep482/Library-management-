<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details - Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">📚 LibraryHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="browse-books.html">Browse Books</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="my-books.html">My Books</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="membership.html">Membership</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="user-profile.html">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="settings.html">Settings</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logoutUser()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container dashboard-container">
        <button class="btn btn-secondary mb-3" onclick="window.history.back()">← Back</button>

        <div id="bookDetailsContainer">
            <!-- Book details will be loaded here -->
        </div>

        <!-- Reviews Section -->
        <div class="row mt-4">
            <div class="col-md-8">
                <div class="table-container">
                    <h3 class="mb-3">📝 Reader Reviews</h3>
                    <div id="reviewsSection">
                        <!-- Reviews will be loaded here -->
                    </div>
                    
                    <div class="mt-4">
                        <h5>Leave a Review</h5>
                        <form id="reviewForm">
                            <div class="form-group mb-2">
                                <label for="rating">Rating</label>
                                <select class="form-control" id="rating" required>
                                    <option value="">Select a rating...</option>
                                    <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                                    <option value="4">⭐⭐⭐⭐ Good</option>
                                    <option value="3">⭐⭐⭐ Average</option>
                                    <option value="2">⭐⭐ Poor</option>
                                    <option value="1">⭐ Very Poor</option>
                                </select>
                            </div>
                            <div class="form-group mb-2">
                                <label for="review">Review</label>
                                <textarea class="form-control" id="review" placeholder="Write your review..." rows="4" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Submit Review</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Related Books -->
            <div class="col-md-4">
                <div class="table-container">
                    <h3 class="mb-3">📚 Related Books</h3>
                    <div id="relatedBooks">
                        <!-- Related books will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Library Management System. All rights reserved.</p>
        <p><a href="#">Privacy Policy</a> | <a href="#">Terms of Service</a> | <a href="#">Contact Us</a></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script>
        checkAuth();

        function loadBookDetails() {
            const bookId = getQueryParam('id');
            const book = getBookById(bookId);
            
            if (!book) {
                document.getElementById('bookDetailsContainer').innerHTML = '<div class="alert alert-danger">Book not found.</div>';
                return;
            }

            const container = document.getElementById('bookDetailsContainer');
            container.innerHTML = `
                <div class="book-details-container">
                    <div class="book-details-header">
                        <div class="book-cover">${book.icon}</div>
                        <div class="book-info">
                            <h1>${book.title}</h1>
                            <div class="author">${book.author}</div>
                            <div class="book-rating">⭐ ${book.rating}/5.0 Rating</div>
                            
                            <div class="book-meta">
                                <div class="meta-item">
                                    <span class="meta-label">Category</span>
                                    <span class="meta-value">${book.category}</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">ISBN</span>
                                    <span class="meta-value">${book.isbn}</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">Pages</span>
                                    <span class="meta-value">${book.pages}</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">Published</span>
                                    <span class="meta-value">${book.publishedYear}</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">Language</span>
                                    <span class="meta-value">${book.language}</span>
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button class="btn btn-primary" onclick="borrowBook(${book.id}, '${book.title}')">📥 Borrow Book</button>
                                <button class="btn btn-outline-primary">❤️ Add to Wishlist</button>
                                <button class="btn btn-outline-primary">📤 Share</button>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4">
                        <h3>📖 About This Book</h3>
                        <p class="book-description-full">${book.fullDescription}</p>
                    </div>
                </div>
            `;

            // Load related books
            loadRelatedBooks(book.category, book.id);

            // Load sample reviews
            loadSampleReviews();
        }

        function loadRelatedBooks(category, currentBookId) {
            const related = booksData.filter(b => b.category === category && b.id !== currentBookId).slice(0, 3);
            const container = document.getElementById('relatedBooks');
            
            container.innerHTML = related.map(book => `
                <div class="book-card">
                    <div class="book-image">${book.icon}</div>
                    <div class="book-content">
                        <div class="book-title">${book.title}</div>
                        <div class="book-author"><span>Author:</span> ${book.author}</div>
                        <div class="book-rating">⭐ ${book.rating}</div>
                        <button class="btn btn-primary w-100 mt-2" onclick="window.location.href='book-details.html?id=${book.id}'">View</button>
                    </div>
                </div>
            `).join('');
        }

        function loadSampleReviews() {
            const reviews = [
                { author: 'John Doe', rating: 5, text: 'Amazing book! Highly recommended to everyone.' },
                { author: 'Jane Smith', rating: 4, text: 'Great story with interesting characters.' },
                { author: 'Mark Johnson', rating: 5, text: 'One of the best books I have ever read!' }
            ];

            const container = document.getElementById('reviewsSection');
            container.innerHTML = reviews.map(review => `
                <div class="mb-3 pb-3" style="border-bottom: 1px solid #e0e0e0;">
                    <div><strong>${review.author}</strong> <span class="text-warning">${'⭐'.repeat(review.rating)}</span></div>
                    <p class="text-muted mb-1">${review.text}</p>
                </div>
            `).join('');
        }

        document.getElementById('reviewForm').addEventListener('submit', function(e) {
            e.preventDefault();
            showNotification('Thank you for your review!', 'success');
            this.reset();
        });

        loadBookDetails();
    </script>
</body>
</html>
